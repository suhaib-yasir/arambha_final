<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #1B2B48; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        .header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 20px 40px; }
        .content { padding: 40px; background: #ffffff; }
        .info-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .info-item { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .label { font-size: 10px; font-weight: bold; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .value { font-size: 14px; font-weight: bold; color: #1B2B48; }
        .message-box { background: #fffcf0; border: 1px solid #ffe4b3; border-radius: 12px; padding: 25px; margin: 20px 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 30px; }
        .btn { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .btn-primary { background: #1B2B48; color: #ffffff; }
        .btn-secondary { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h3 style="margin:0; color:#1B2B48;">New Website Inquiry 📥</h3>
        </div>
        <div class="content">
            <p>Admin, you have received a new contact inquiry from the Arambha website.</p>
            
            <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                <tr>
                    <td style="width: 50%; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px 0 0 0;">
                        <span class="label">Sender Name</span>
                        <span class="value">{{ name }}</span>
                    </td>
                    <td style="width: 50%; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0 8px 0 0;">
                        <span class="label">Phone</span>
                        <span class="value">{{ phone }}</span>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0 0 8px 8px;">
                        <span class="label">Email Address</span>
                        <span class="value">{{ email }}</span>
                    </td>
                </tr>
            </table>

            <div>
                <span class="label">Subject</span>
                <p style="margin:5px 0; font-weight:bold; font-size: 16px;">{{ subject }}</p>
            </div>

            <div class="message-box">
                <span class="label">Message</span>
                <p style="margin:10px 0; font-style: italic;">"{{ message }}"</p>
            </div>

            <div style="margin-top: 30px;">
                <a href="mailto:{{ email }}" style="background: #1B2B48; color: #ffffff; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-right: 10px;">Reply via Email</a>
                <a href="tel:{{ phone }}" style="background: #f1f5f9; color: #64748b; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 1px solid #e2e8f0;">Call Now</a>
            </div>
        </div>
    </div>
</body>
</html>
