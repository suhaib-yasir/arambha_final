<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .header { background-color: #f8f9fa; padding: 10px; text-align: center; border-bottom: 2px solid #e0c879; }
        .content { padding: 20px 0; }
        .detail-row { margin-bottom: 10px; }
        .label { font-weight: bold; width: 150px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>New {{ program_type }} Alert</h2>
        </div>
        <div class="content">
            <p>A new student has successfully completed a {{ program_type }} on Arambha LMS.</p>
            <h3>Student Details:</h3>
            <div class="detail-row"><span class="label">Name:</span> {{ student_name }}</div>
            <div class="detail-row"><span class="label">Email:</span> {{ student_email }}</div>
            <div class="detail-row"><span class="label">Program:</span> {{ program_name }}</div>
            <br>
            <h3>Additional Details:</h3>
            <pre style="font-family: inherit; background-color: #f8f9fa; padding: 15px; border-radius: 5px; white-space: pre-wrap;">{{ other_details }}</pre>
        </div>
    </div>
</body>
</html>
